<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Bai 5.2</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<div id="tong">
		<div id="san_ho_trai">
			<img src="IMAGES\sanho.gif" style="width: 110%;height: 100%;position: absolute;">
		</div>
		<div id="vien"></div>
		<div id="sua">
			<div class="strai">
				<div class="sttren">
					<font color="mediumred" size="30">
						<b>THAM GIA CLB</b>
					</font>
				</div>
				<div class="stduoi">
					<div class="stdtrai"></div>
					<div class="stdgiua">
						<div class="tren">
							
								Quý độc giả hãy điền đầy đủ thông tin để tham gia phát triển Câu lạc bộ
								<br>
								ngày càng vững mạnh hơn.

						</div>
						<div class="duoi">
							<form>
								<table>
									<tr valign="middle" align="left">
										<td>
											<label>Họ và tên:</label>
										</td>
										<td>
											<input type="text" name="hvt" size="30">*
										</td>
									</tr>
									<tr valign="middle" align="left">
										<td>
											<label>Địa chỉ:</label>
										</td>
										<td>
											<input type="text" name="dc" size="40">
										</td>
									</tr>
									<tr valign="middle" align="left">
										<td>
											<label>Email:</label>
										</td>
										<td>
											<input type="Email" name="email" size="30">*
										</td>
									</tr>
									<tr valign="middle" align="left">
										<td>
											<label>Điện thoại:</label>
										</td>
										<td>
											<input type="text" name="dt" size="20">*
										</td>
									</tr>
									<tr valgn="middle" align="left">
										<td>
											<label>Ngày sinh:</label>
										</td>
										<td>
											<input type="text" name="ngay" size="2">/
											<input type="text" name="thang" size="2">
											<input type="text" name="nam" size="4">*
										</td>
									</tr>
									<tr align="left">
										<td>
											<label>Đề tài:</label>
										</td>
										<td>
											<select>
												<option>Tìm hiểu sữa biển</option>
											</select>
										</td>
									</tr>
									<tr align="left" valign="top">
										<td>
											<label>
												Nhóm:
											</label>
										</td>
										<td>
											<input type="radio" name="nhóm">Nghiên cứ
											<br>
											<input type="radio" name="nhóm">Hải ngư
											<br>
											<input type="radio" name="nhóm">Viễn dương
											<br>
											<input type="radio" name="nhóm">Mĩ thuật
											<br>
											<input type="radio" name="nhóm">Thực phẩm
											<br>
											<input type="radio" name="nhóm">Sinh viên
											<br>
										</td>
									</tr>
									<tr align="left">
										<td>
											<label>Gởi hình:</label>
										</td>
										<td>
											<input type="file" id="file" style="display: none;" />
											<input type="button" value="Browse..." onclick="document.getElementById('file').click();" />
										</td>
									</tr>
									<tr align="left" valign="top">
										<td>
											<label>Tài liệu:</label>
										</td>
										<td>
											<input type="checkbox" name="tl">Sinh vật biển
											<br>
											<input type="checkbox" name="tl">Các loài Sứa biển
											<br>
											<input type="checkbox" name="tl">San hô
											<br>
											<input type="checkbox" name="tl">Môi trường biển
											<br>
											<input type="checkbox" name="tl">Khí hậu
											<br>
										</td>
									</tr>
									<tr align="center">
										<td>
											<button type="submit">Tham gia</button>
										</td>
										<td>
											<button type="reset">Xóa thông tin</button>
										</td>
									</tr>
								</table>
							</form>
						</div>
					</div>
					<div class="stdphai"></div>
				</div>
			</div>
			<div class="sphai">
				<img src="IMAGES/nhom1a.jpg">
				<img src="IMAGES/nhom1b.jpg">
				<img src="IMAGES/nhom1c.jpg">
				<img src="IMAGES/nhom1d.jpg">
			</div>
		</div>
		
	</div>

</body>
</html>
